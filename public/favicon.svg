  <circle cx="32" cy="32" r="30" fill="#1e3a5f"/>

  <!-- Ice rings -->
  <circle cx="32" cy="24" r="16" fill="#dc2626" stroke="white" stroke-width="1"/>
  <circle cx="32" cy="24" r="12" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <circle cx="32" cy="24" r="8" fill="#dc2626" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <circle cx="32" cy="24" r="4" fill="white"/>

  <!-- Stone body -->
  <circle cx="32" cy="44" r="9" fill="#6b7280"/>
